<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>⚡ TruthFeed</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

  <nav class="navbar">
    <span class="logo">// TRUTHFEED</span>
    <div class="nav-tabs">
      <button class="tab active" data-tab="feed">🔥 Feed</button>
      <button class="tab" data-tab="map">🧭 Emotion Map</button>
    </div>
  </nav>

  <!-- FEED -->
  <section id="feed" class="tab-content active">

    <!-- Composer trigger -->
    <div class="composer-trigger" id="add-post-btn">
      <div class="avatar-placeholder">👤</div>
      <span>Drop a claim — truth or lie, you decide...</span>
    </div>

    <!-- Composer -->
    <div id="composer" class="composer hidden">
      <textarea id="post-input" placeholder="Write something true... or not 😏" maxlength="280"></textarea>
      <div class="composer-footer">
        <select id="post-category">
          <option value="science">🔬 Science</option>
          <option value="history">📜 History</option>
          <option value="pop">🎤 Pop Culture</option>
          <option value="random">🎲 Random</option>
        </select>
        <button class="btn-post" id="submit-post">Post It</button>
      </div>
    </div>

    <p class="feed-label">Trending Claims</p>
    <div id="posts-container"></div>

  </section>

  <!-- EMOTION MAP -->
  <section id="map" class="tab-content">
    <div id="emotion-map"></div>

    <div id="emotion-panel" class="emotion-panel hidden">
      <div class="panel-header">
        <div>
          <p id="panel-location"></p>
          <p id="panel-mood"></p>
        </div>
        <button id="close-panel">✕</button>
      </div>
      <div id="panel-posts"></div>
    </div>

    <div class="map-legend">
      <span>😄 Happy</span>
      <span>😔 Stressed</span>
      <span>😶 Lonely</span>
      <span>😡 Angry</span>
      <span>😌 Calm</span>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="map.js"></script>
  <script src="app.js"></script>
</body>
</html>
